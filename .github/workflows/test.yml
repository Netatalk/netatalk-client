name: Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
    types:
      - opened
      - synchronize
      - reopened

env:
  REGISTRY: ghcr.io
  REPO: ${{ github.repository }}

jobs:
  formatting:
    name: Code Formatting
    runs-on: macos-latest
    env:
      HOMEBREW_NO_INSTALL_CLEANUP: 1
      HOMEBREW_NO_AUTO_UPDATE: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          brew update
          brew install \
            astyle \
            markdownlint-cli2 \
            muon \
            shfmt \
            yamlfmt
      - name: Check C formatting
        run: ./contrib/scripts/codefmt.sh -v -s c
      - name: Check markdown formatting
        run: ./contrib/scripts/codefmt.sh -v -s markdown
      - name: Check meson formatting
        run: ./contrib/scripts/codefmt.sh -v -s meson
      - name: Check shell script formatting
        run: ./contrib/scripts/codefmt.sh -v -s shell
      - name: Check yaml formatting
        run: ./contrib/scripts/codefmt.sh -v -s yaml

  markdown-linting:
    name: Markdown Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: '**/*.md'

  build-container-tests:
    name: Build integration test container
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !github.event.pull_request.head.repo.fork }}
    permissions:
      packages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Create image name
        run: |
          echo "IMAGE_NAME=${REPO,,}-tests" >> ${GITHUB_ENV}
      - name: Login to container registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=${{ github.sha }}
      - name: Build and push container image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: test/Dockerfile
          push: true
          labels: ${{ steps.metadata.outputs.labels }}
          tags: ${{ steps.metadata.outputs.tags }}

  run-container-tests:
    name: Run integration tests
    needs: build-container-tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ github.actor != 'dependabot[bot]' }}
    steps:
      - name: Create image name
        run: |
          echo "IMAGE_NAME=${REPO,,}-tests" >> ${GITHUB_ENV}
      - name: Run integration tests
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  distribution-tests:
    name: Distribution Tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --assume-yes --no-install-recommends \
            gcc \
            libgcrypt-dev \
            libfuse-dev \
            libreadline-dev \
            meson \
            ninja-build
      - name: Configure
        run: |
          meson setup build -Dbuildtype=release
      - name: Run distribution tests
        run: meson dist -C build
